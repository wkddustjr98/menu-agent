name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/ec2_key.pem \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              "bash ~/deploy_menu_agent.sh"